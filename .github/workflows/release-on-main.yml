name: Release On Main

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      GH_TOKEN: ${{ github.token }}
      MECHA_RELEASE_TARGET: ${{ github.sha }}
      MECHA_RELEASE_ALLOW_EXISTING: 1
      MECHA_SKIP_DMG_STYLING: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release metadata
        run: |
          bash ./scripts/validate_release_metadata.sh
          bash ./Tests/test_release_pipeline.sh
          bash ./Tests/test_release_metadata_validation.sh
          bash ./Tests/test_update_site.sh

      - name: Resolve release capabilities
        id: release_capabilities
        env:
          MECHA_SIGN_IDENTITY: ${{ secrets.MECHA_SIGN_IDENTITY }}
          MECHA_SIGN_CERT_P12_BASE64: ${{ secrets.MECHA_SIGN_CERT_P12_BASE64 }}
          MECHA_SIGN_CERT_PASSWORD: ${{ secrets.MECHA_SIGN_CERT_PASSWORD }}
          MECHA_NOTARY_APPLE_ID: ${{ secrets.MECHA_NOTARY_APPLE_ID }}
          MECHA_NOTARY_TEAM_ID: ${{ secrets.MECHA_NOTARY_TEAM_ID }}
          MECHA_NOTARY_APP_PASSWORD: ${{ secrets.MECHA_NOTARY_APP_PASSWORD }}
        run: |
          source ./scripts/release_common.sh

          if signing_secrets_ready; then
            MECHA_ALLOW_UNSIGNED_APPCAST=0
            echo "signing_configured=true" >> "$GITHUB_OUTPUT"
            echo "MECHA_SIGN_MODE=developer_id" >> "$GITHUB_ENV"
            echo "MECHA_ALLOW_UNSIGNED_APPCAST=$MECHA_ALLOW_UNSIGNED_APPCAST" >> "$GITHUB_ENV"
            {
              echo "MECHA_SIGN_IDENTITY<<EOF"
              echo "$MECHA_SIGN_IDENTITY"
              echo "EOF"
            } >> "$GITHUB_ENV"
            echo "[*] Developer ID signing enabled for this release."
          else
            MECHA_ALLOW_UNSIGNED_APPCAST=1
            echo "signing_configured=false" >> "$GITHUB_OUTPUT"
            echo "MECHA_SIGN_MODE=adhoc" >> "$GITHUB_ENV"
            echo "MECHA_SIGN_IDENTITY=" >> "$GITHUB_ENV"
            echo "MECHA_ALLOW_UNSIGNED_APPCAST=$MECHA_ALLOW_UNSIGNED_APPCAST" >> "$GITHUB_ENV"
            echo "[*] Developer ID signing secrets are unavailable; publishing an ad-hoc release track."
            echo "[*] Builds below AUTOUPDATE_COMPATIBILITY_BUILD_FLOOR will receive a manual release download prompt."
          fi

          if notarization_secrets_ready; then
            echo "notarization_configured=true" >> "$GITHUB_OUTPUT"
            echo "MECHA_NOTARY_PROFILE=mecha-notary" >> "$GITHUB_ENV"
            echo "[*] Apple notarization enabled for this release."
          else
            echo "notarization_configured=false" >> "$GITHUB_OUTPUT"
            echo "MECHA_NOTARY_PROFILE=" >> "$GITHUB_ENV"
            echo "[*] Apple notarization secrets are unavailable; continuing without notarization."
          fi

          if update_site_generation_ready; then
            echo "update_site_enabled=true" >> "$GITHUB_OUTPUT"
            echo "MECHA_SKIP_UPDATE_SITE=0" >> "$GITHUB_ENV"
            echo "[*] Sparkle update feed generation enabled for this release."
          else
            echo "update_site_enabled=false" >> "$GITHUB_OUTPUT"
            echo "MECHA_SKIP_UPDATE_SITE=1" >> "$GITHUB_ENV"
            echo "[*] Sparkle update feed generation disabled for this release configuration."
          fi

      - name: Prepare internal release metadata
        if: steps.release_capabilities.outputs.signing_configured != 'true'
        env:
          MECHA_INTERNAL_BUILD_NUMBER: ${{ github.run_number }}
        run: |
          bash ./scripts/prepare_internal_release_version.sh

      - name: Import signing certificate
        env:
          MECHA_SIGN_CERT_P12_BASE64: ${{ secrets.MECHA_SIGN_CERT_P12_BASE64 }}
          MECHA_SIGN_CERT_PASSWORD: ${{ secrets.MECHA_SIGN_CERT_PASSWORD }}
        if: steps.release_capabilities.outputs.signing_configured == 'true'
        run: |
          if [[ -z "${MECHA_SIGN_CERT_P12_BASE64:-}" || -z "${MECHA_SIGN_CERT_PASSWORD:-}" || -z "${MECHA_SIGN_IDENTITY:-}" ]]; then
            echo "Missing signing certificate secrets" >&2
            exit 1
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/mecha-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/mecha-signing.p12"

          export CERT_PATH
          python3 - <<'PY'
          import base64
          import os

          with open(os.environ["CERT_PATH"], "wb") as cert_file:
              cert_file.write(base64.b64decode(os.environ["MECHA_SIGN_CERT_P12_BASE64"]))
          PY
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MECHA_SIGN_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Configure notarytool profile
        env:
          MECHA_NOTARY_APPLE_ID: ${{ secrets.MECHA_NOTARY_APPLE_ID }}
          MECHA_NOTARY_TEAM_ID: ${{ secrets.MECHA_NOTARY_TEAM_ID }}
          MECHA_NOTARY_APP_PASSWORD: ${{ secrets.MECHA_NOTARY_APP_PASSWORD }}
        if: steps.release_capabilities.outputs.notarization_configured == 'true'
        run: |
          if [[ -z "${MECHA_NOTARY_APPLE_ID:-}" || -z "${MECHA_NOTARY_TEAM_ID:-}" || -z "${MECHA_NOTARY_APP_PASSWORD:-}" ]]; then
            echo "Missing notarization secrets" >&2
            exit 1
          fi

          xcrun notarytool store-credentials "$MECHA_NOTARY_PROFILE" \
            --apple-id "$MECHA_NOTARY_APPLE_ID" \
            --team-id "$MECHA_NOTARY_TEAM_ID" \
            --password "$MECHA_NOTARY_APP_PASSWORD"

      - name: Build and publish release
        env:
          MECHA_SPARKLE_PRIVATE_KEY: ${{ secrets.MECHA_SPARKLE_PRIVATE_KEY }}
        run: |
          bash ./release_mecha.sh

      - name: Configure Pages
        if: steps.release_capabilities.outputs.update_site_enabled == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.release_capabilities.outputs.update_site_enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/appcast-site

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.release_capabilities.outputs.update_site_enabled == 'true'
        uses: actions/deploy-pages@v4
