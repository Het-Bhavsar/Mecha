name: Release On Main

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      GH_TOKEN: ${{ github.token }}
      MECHA_SIGN_MODE: developer_id
      MECHA_SIGN_IDENTITY: ${{ secrets.MECHA_SIGN_IDENTITY }}
      MECHA_NOTARY_PROFILE: mecha-notary
      MECHA_RELEASE_TARGET: ${{ github.sha }}
      MECHA_SKIP_DMG_STYLING: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release metadata
        run: |
          bash ./scripts/validate_release_metadata.sh
          bash ./Tests/test_release_pipeline.sh
          bash ./Tests/test_release_metadata_validation.sh
          bash ./Tests/test_update_site.sh

      - name: Import signing certificate
        env:
          MECHA_SIGN_CERT_P12_BASE64: ${{ secrets.MECHA_SIGN_CERT_P12_BASE64 }}
          MECHA_SIGN_CERT_PASSWORD: ${{ secrets.MECHA_SIGN_CERT_PASSWORD }}
        run: |
          if [[ -z "${MECHA_SIGN_CERT_P12_BASE64:-}" || -z "${MECHA_SIGN_CERT_PASSWORD:-}" || -z "${MECHA_SIGN_IDENTITY:-}" ]]; then
            echo "Missing signing certificate secrets" >&2
            exit 1
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/mecha-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/mecha-signing.p12"

          export CERT_PATH
          python3 - <<'PY'
          import base64
          import os

          with open(os.environ["CERT_PATH"], "wb") as cert_file:
              cert_file.write(base64.b64decode(os.environ["MECHA_SIGN_CERT_P12_BASE64"]))
          PY
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MECHA_SIGN_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Configure notarytool profile
        env:
          MECHA_NOTARY_APPLE_ID: ${{ secrets.MECHA_NOTARY_APPLE_ID }}
          MECHA_NOTARY_TEAM_ID: ${{ secrets.MECHA_NOTARY_TEAM_ID }}
          MECHA_NOTARY_APP_PASSWORD: ${{ secrets.MECHA_NOTARY_APP_PASSWORD }}
        run: |
          if [[ -z "${MECHA_NOTARY_APPLE_ID:-}" || -z "${MECHA_NOTARY_TEAM_ID:-}" || -z "${MECHA_NOTARY_APP_PASSWORD:-}" ]]; then
            echo "Missing notarization secrets" >&2
            exit 1
          fi

          xcrun notarytool store-credentials "$MECHA_NOTARY_PROFILE" \
            --apple-id "$MECHA_NOTARY_APPLE_ID" \
            --team-id "$MECHA_NOTARY_TEAM_ID" \
            --password "$MECHA_NOTARY_APP_PASSWORD"

      - name: Build and publish release
        run: |
          bash ./release_mecha.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/appcast-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
